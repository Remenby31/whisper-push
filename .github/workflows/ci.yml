name: CI

on:
  push:
    branches: [main, rust-rewrite]
  pull_request:

jobs:
  check:
    strategy:
      # One failing platform shouldn't cancel the others (whisper.cpp's CMake
      # tries to build ggml-metal on Linux, which is a separate upstream
      # issue tracked elsewhere — don't let it mask macOS/Windows results).
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            features: "metal"
            name: "macOS (Metal)"
          - os: ubuntu-latest
            features: ""
            name: "Linux (CPU)"
          - os: windows-latest
            features: ""
            name: "Windows (CPU)"
    runs-on: ${{ matrix.os }}
    name: Check — ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev cmake \
            libgtk-3-dev libglib2.0-dev libxdo-dev libayatana-appindicator3-dev \
            libxkbcommon-dev libwayland-dev
      - name: Check
        run: cargo check --features "${{ matrix.features }}"
      - name: Build
        run: cargo build --features "${{ matrix.features }}"

  test:
    runs-on: macos-14
    name: Tests (macOS)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run unit tests
        # `cargo test` runs lib+bin unit tests and every test target under tests/.
        # The previous `--test integration` referenced a file that no longer
        # exists; the real targets are unit_tests, transcription_tests, hardware_tests.
        run: cargo test --features metal --lib -- --nocapture

  clippy:
    runs-on: macos-14
    name: Clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy --features metal -- -W warnings

  format:
    runs-on: ubuntu-latest
    name: Format
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check format
        run: cargo fmt --check
