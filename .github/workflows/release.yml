name: Release

on:
  push:
    tags: ['v*']
  # Allow dry-running the full pipeline from the Actions tab without tagging.
  workflow_dispatch:

permissions:
  contents: write

env:
  # Runtime system libraries needed by tray-icon, enigo, glib, wgpu, alsa.
  LINUX_DEPS: >-
    libasound2-dev cmake pkg-config
    libgtk-3-dev libglib2.0-dev libxdo-dev libayatana-appindicator3-dev
    libxkbcommon-dev libwayland-dev

jobs:
  # ─── macOS (Apple Silicon, Metal + all models) ─────
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Import Developer ID certificate into a temporary CI keychain
      - name: Import code signing certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm certificate.p12

      # Write the App Store Connect API key for notarization
      - name: Write API key
        if: env.APPLE_API_KEY_BASE64 != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      # Determine signing identity (Developer ID if cert available, else ad-hoc)
      - name: Build + sign + DMG + ZIP
        env:
          HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          if [ "$HAS_CERT" = "true" ]; then
            SIGN="Developer ID Application: Baptiste Cruvellier (3SNT64YKAS)"
          else
            SIGN="-"
          fi
          make dmg SIGN_ID="$SIGN"
          make zip SIGN_ID="$SIGN"

      - name: Notarize DMG
        if: env.APPLE_API_KEY_BASE64 != ''
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          make notarize-ci \
            APPLE_API_KEY_PATH=~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            APPLE_API_KEY_ID="$APPLE_API_KEY_ID" \
            APPLE_API_ISSUER_ID="$APPLE_API_ISSUER_ID"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whisper-push-macos-arm64
          path: |
            build/dist/*.dmg
            build/dist/*.zip

  # ─── Linux CPU — installer .deb + portable .tar.gz ─────────────────────────
  linux-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y $LINUX_DEPS
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build release (no GPU features)
        run: cargo build --release --no-default-features --features voxtral,parakeet
      - name: Package .deb
        run: cargo deb --no-build --output dist/whisper-push_amd64.deb
      - name: Package portable .tar.gz
        run: |
          mkdir -p dist/portable
          cp target/release/whisper-push dist/portable/
          tar czf dist/whisper-push-linux-x86_64.tar.gz -C dist/portable .
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whisper-push-linux-x86_64
          path: |
            dist/*.deb
            dist/*.tar.gz

  # ─── Linux CUDA — installer .deb + portable .tar.gz ───────────────────────
  linux-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '12.4.0'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y $LINUX_DEPS
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build release (CUDA)
        run: cargo build --release --no-default-features --features cuda,voxtral,parakeet
      - name: Package .deb
        run: cargo deb --no-build --output dist/whisper-push-cuda_amd64.deb
      - name: Package portable .tar.gz
        run: |
          mkdir -p dist/portable
          cp target/release/whisper-push dist/portable/
          tar czf dist/whisper-push-linux-x86_64-cuda.tar.gz -C dist/portable .
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whisper-push-linux-x86_64-cuda
          path: |
            dist/*.deb
            dist/*.tar.gz

  # ─── Windows CPU — installer .msi + portable .zip ─────────────────────────
  windows-cpu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install WiX Toolset 3.14
        # GitHub removed WiX from the runner images; cargo-wix needs candle/light
        # on PATH. Fetch the WiX 3.14 binaries and add them.
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip -OutFile wix314.zip
          Expand-Archive -Path wix314.zip -DestinationPath wix314 -Force
          "$PWD\wix314" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install cargo-wix
        run: cargo install cargo-wix --locked
      - name: Build release (no GPU features)
        run: cargo build --release --no-default-features --features voxtral,parakeet
      - name: Initialize wix template (if missing)
        shell: bash
        run: |
          [ -f wix/main.wxs ] || cargo wix init -p whisper-push --force
      - name: Package .msi
        # WiX is installed above; keep continue-on-error so a future WiX/toolchain
        # break omits the .msi (portable .zip still ships) instead of blocking.
        continue-on-error: true
        run: cargo wix --no-build --nocapture --output dist/whisper-push-x64.msi
      - name: Package portable .zip
        shell: bash
        run: |
          mkdir -p dist/portable
          cp target/release/whisper-push.exe dist/portable/
          cd dist/portable && 7z a ../whisper-push-windows-x64.zip .
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whisper-push-windows-x64
          path: |
            dist/*.msi
            dist/*.zip

  # ─── Windows CUDA — installer .msi + portable .zip ────────────────────────
  windows-cuda:
    # Pin to windows-2022: windows-latest now ships Visual Studio 18 (2026), whose
    # generator ("Visual Studio 18 2026") + MSVC 14.51 aren't supported by CUDA
    # 12.4's nvcc, so the whisper.cpp CUDA build can't configure. windows-2022 has
    # VS 2022 — the combo that built successfully before the image bump.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '12.4.0'
      - name: Install WiX Toolset 3.14
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip -OutFile wix314.zip
          Expand-Archive -Path wix314.zip -DestinationPath wix314 -Force
          "$PWD\wix314" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install cargo-wix
        run: cargo install cargo-wix --locked
      - name: Build release (CUDA)
        id: build_cuda
        # Never hard-fail the whole release on Windows CUDA toolchain churn: the
        # job still succeeds (downstream steps are gated on this one's success),
        # and the release simply omits the Windows-CUDA variant if it breaks.
        continue-on-error: true
        run: cargo build --release --no-default-features --features cuda,voxtral,parakeet
      - name: Initialize wix template (if missing)
        if: steps.build_cuda.outcome == 'success'
        shell: bash
        run: |
          [ -f wix/main.wxs ] || cargo wix init -p whisper-push --force
      - name: Package .msi
        if: steps.build_cuda.outcome == 'success'
        # See windows-cpu note: WiX isn't on the runner; don't block the release.
        continue-on-error: true
        run: cargo wix --no-build --nocapture --output dist/whisper-push-x64-cuda.msi
      - name: Package portable .zip
        if: steps.build_cuda.outcome == 'success'
        shell: bash
        run: |
          mkdir -p dist/portable
          cp target/release/whisper-push.exe dist/portable/
          cd dist/portable && 7z a ../whisper-push-windows-x64-cuda.zip .
      - name: Upload artifacts
        if: steps.build_cuda.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-push-windows-x64-cuda
          path: |
            dist/*.msi
            dist/*.zip

  # ─── Aggregate everything into the GitHub Release ─────────────────────────
  # Only runs on a tag push — on workflow_dispatch the action-gh-release step
  # has no tag context, so it errors with "GitHub Releases requires a tag".
  # The build jobs above run on both triggers (manual dispatch is used to dry-
  # run the installer pipeline without publishing).
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, linux-cpu, linux-cuda, windows-cpu, windows-cuda]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
